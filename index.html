<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="./assets/img/logo.png" alt="imagen de logo">
        <h2>Character Counter</h2>
        <button><img src="./assets/img/cambio-de-tema.png" alt="cambio de tema oscuro a claro"></button>
    </header>
    <section>
        <h1>Analyze you text in real-time.</h1>
        <textarea name="" id="texto"></textarea>
        <div class="opciones">
            <label class="checkbox">
                <input type="checkbox" >
                <span>Exclude Spaces</span>
            </label>
            <label class="checkbox">
                <input type="checkbox" >
                <span>Set Character Limit</span>
            </label>
            <span class="texto-aproximado">Approx. reading time: <1 minute</span>
        </div>
        <div class="cards">
            <div class="card1">
                <h3>278</h3>
                <h4>Total Characters</h4>
            </div>
            <div class="card2">
                <h3>39</h3>
                <h4>Word Count</h4>
            </div>
            <div class="card3">
                <h3>04</h3>
                <h4>Sentence Count</h4>
            </div>
        </div>
        <h2>Letter Density</h2>
        <div class="barra-progreso">
            <div class="fila">
                <span class="letra">E</span>
                <div class="barra">
                    <div class="relleno r1"></div>
                </div>
                <span class="numero">40 (16.06%)</span>
            </div>
            <div class="fila">
                <span class="letra">I</span>
                <div class="barra">
                    <div class="relleno r2"></div>
                </div>
                <span class="numero">29 (11.65%)</span>
            </div>
            <div class="fila">
                <span class="letra">T</span>
                <div class="barra">
                    <div class="relleno r3"></div>
                </div>
                <span class="numero">28 (11.24%)</span>
            </div>
            <div class="fila">
                <span class="letra">O</span>
                <div class="barra">
                    <div class="relleno r4"></div>
                </div>
                <span class="numero">22 (8.84%)</span>
            </div>
            <div class="fila">
                <span class="letra">N</span>
                <div class="barra">
                    <div class="relleno r5"></div>
                </div>
                <span class="numero">21 (8.43%)</span>
            </div>
        </div>
    </section>
</body>
</html>
